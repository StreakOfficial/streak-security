<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Streak Verification</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050008;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* glowing background */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(217,70,255,.15), transparent 60%);
  pointer-events:none;
}

/* main box */
.box{
  width:360px;
  padding:30px;
  border-radius:20px;
  background:rgba(20,0,35,.6);
  border:1px solid rgba(217,70,255,.5);
  box-shadow:0 0 25px rgba(217,70,255,.25);
  text-align:center;
  position:relative;
  z-index:2;
}

/* animated border glow */
.box::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:1px;
  background:linear-gradient(90deg,transparent,#7a1fff,#d946ff,#ffffff,#d946ff,transparent);
  background-size:300% 100%;
  animation:move 5s linear infinite;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
}

@keyframes move{
  0%{background-position:300% 0}
  100%{background-position:0 0}
}

h1{
  margin-bottom:10px;
  color:#d946ff;
  letter-spacing:3px;
}

p{
  opacity:0.7;
  font-size:13px;
}

/* captcha placeholder */
.captcha{
  margin-top:20px;
  padding:20px;
  border:1px dashed rgba(217,70,255,.6);
  border-radius:12px;
  color:#dcb8ff;
  font-size:12px;
}

/* button */
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#d946ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  background:#b02ee6;
}
</style>
</head>

<body>

<div class="box">
  <h1>STREAK VERIFY</h1>
  <p>Complete CAPTCHA to continue</p>

  <div class="captcha">
    CAPTCHA (Cloudflare Turnstile goes here)
  </div>

  <button onclick="verify()">Verify</button>
</div>

<script>
function verify(){
  alert("Verification sent (backend will handle role later)");
}
</script>

</body>
</html>
